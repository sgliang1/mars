# ==========================================
# 基础配置
# ==========================================
server.port=8080
spring.application.name=mars-gateway
spring.main.web-application-type=reactive

# ==========================================
# Nacos 注册 (所有服务)
# ==========================================
spring.cloud.nacos.server-addr=192.168.1.25:8848
spring.cloud.nacos.username=nacos
spring.cloud.nacos.password=030523

# 禁用 Nacos 客户端自带的 logback 配置，避免 appender 名称冲突
nacos.logging.default.config.enabled=false

# Redis 配置（覆盖 Nacos 默认的 localhost）
spring.data.redis.host=192.168.1.25
spring.data.redis.port=6379

# ? 1. 启用 Nacos 配置 (设为 false、或删掉则默认 true)
# spring.cloud.nacos.config.enabled=true (不写默认true)

# ? 2. 导入共享配置 (和 mars-auth 共用)
# 让 Gateway 也从 Nacos 拿 mars-post.properties 里的 mars.jwt.secret 等
spring.config.import=nacos:mars-post.properties?group=DEFAULT_GROUP&refreshEnabled=true
spring.cloud.nacos.config.import-check.enabled=false

# ==========================================
# 路由规则 (按优先级从高到低排列)
# ==========================================
spring.cloud.gateway.discovery.locator.enabled=false
# 禁用 gRPC 自动配置，避免缺少 grpc-netty 依赖导致启动失败
spring.cloud.gateway.grpc.enabled=false

# 1. Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://mars-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/mars-auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# 2. Post Service
spring.cloud.gateway.routes[1].id=post-service
spring.cloud.gateway.routes[1].uri=lb://mars-post
spring.cloud.gateway.routes[1].predicates[0]=Path=/mars-post/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[1].order=100

# ==========================================
# 3. Chat Service (支持 HTTP + WebSocket)
# ==========================================
spring.cloud.gateway.routes[2].id=chat-service
# 使用 lb:ws:// scheme，同时支持 HTTP REST 和 WebSocket 代理
spring.cloud.gateway.routes[2].uri=lb:ws://mars-chat
spring.cloud.gateway.routes[2].predicates[0]=Path=/mars-chat/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# ==========================================
# 4. Relation Service (社交关系)
# ==========================================
spring.cloud.gateway.routes[3].id=compat-relation
spring.cloud.gateway.routes[3].uri=lb://mars-relation
spring.cloud.gateway.routes[3].predicates[0]=Path=/mars-user/relation/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[4].id=relation-service
spring.cloud.gateway.routes[4].uri=lb://mars-relation
spring.cloud.gateway.routes[4].predicates[0]=Path=/mars-relation/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# ==========================================
# 5. User Service (用户资料/等级/信用/仪表盘)
# ==========================================
spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://mars-user
spring.cloud.gateway.routes[5].predicates[0]=Path=/mars-user/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# ==========================================
# 6. Admin Service (管理后台)
# ==========================================
spring.cloud.gateway.routes[6].id=admin-service
spring.cloud.gateway.routes[6].uri=lb://mars-admin
spring.cloud.gateway.routes[6].predicates[0]=Path=/mars-admin/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# ==========================================
# 7. Search Service (搜索/热搜)
# ==========================================
spring.cloud.gateway.routes[7].id=search-service
spring.cloud.gateway.routes[7].uri=lb://mars-search
spring.cloud.gateway.routes[7].predicates[0]=Path=/mars-search/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1

# ==========================================
# 向后兼容路由（Flutter 客户端无需改动）
# ==========================================
# /mars-post/search/** -> mars-search（优先级高于 routes[1] 的兜底路由）
spring.cloud.gateway.routes[8].id=compat-search
spring.cloud.gateway.routes[8].uri=lb://mars-search
spring.cloud.gateway.routes[8].predicates[0]=Path=/mars-post/search/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=1

# ==========================================
# 8. Interaction Service (评论/举报/通知)
# ==========================================
spring.cloud.gateway.routes[9].id=interaction-service
spring.cloud.gateway.routes[9].uri=lb://mars-interaction
spring.cloud.gateway.routes[9].predicates[0]=Path=/mars-interaction/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=1

# /mars-post/comments/** -> mars-interaction
spring.cloud.gateway.routes[10].id=compat-comments
spring.cloud.gateway.routes[10].uri=lb://mars-interaction
spring.cloud.gateway.routes[10].predicates[0]=Path=/mars-post/comments/**
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=1

# /mars-post/reports/** -> mars-interaction
spring.cloud.gateway.routes[11].id=compat-reports
spring.cloud.gateway.routes[11].uri=lb://mars-interaction
spring.cloud.gateway.routes[11].predicates[0]=Path=/mars-post/reports/**
spring.cloud.gateway.routes[11].filters[0]=StripPrefix=1

# /mars-post/notification/** -> mars-interaction
spring.cloud.gateway.routes[12].id=compat-notification
spring.cloud.gateway.routes[12].uri=lb://mars-interaction
spring.cloud.gateway.routes[12].predicates[0]=Path=/mars-post/notification/**
spring.cloud.gateway.routes[12].filters[0]=StripPrefix=1

# ==========================================
# 通用配置
# ==========================================
spring.codec.max-in-memory-size=30MB
spring.cloud.gateway.httpclient.connect-timeout=60000
spring.cloud.gateway.httpclient.response-timeout=300s

# ? JWT密钥、数据库等敏感配置请放在 Nacos 配置中心
# mars.jwt.secret=... (从 Nacos 配置中心获取)

# ========================
# 网关鉴权白名单（精确路径匹配，逗号分隔）
# ========================
gateway.auth.whitelist=/mars-auth/login,/mars-auth/register,/mars-auth/refresh,/mars-admin/admin/auth/login,/mars-admin/admin/auth/refresh

# ========================
# 网关限流配置（Redis 滑动窗口，两级限流）
# ========================
gateway.rate-limit.enabled=true

# IP 维度限流（所有请求）
gateway.rate-limit.ip-read.limit=200
gateway.rate-limit.ip-read.window-seconds=60
gateway.rate-limit.ip-write.limit=50
gateway.rate-limit.ip-write.window-seconds=60

# 用户维度限流（仅对已登录用户生效）
gateway.rate-limit.user-read.limit=300
gateway.rate-limit.user-read.window-seconds=60
gateway.rate-limit.user-write.limit=80
gateway.rate-limit.user-write.window-seconds=60

# 信用分集成：低于阈值的用户按倍率降额
gateway.rate-limit.credit-threshold=80
gateway.rate-limit.credit-multiplier=0.3

# 跳过限流的路径（如健康检查）
gateway.rate-limit.skip-paths=/actuator/health

# ========================
# Actuator + Prometheus 指标
# ========================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=${spring.application.name}

# ========================
# Resilience4j Circuit Breaker (Gateway 层)
# ========================
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# 默认熔断器配置
resilience4j.circuitbreaker.instances.default.register-health-indicator=true
resilience4j.circuitbreaker.instances.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.default.automatic-transition-from-open-to-half-open-enabled=true

# ========================
# 优雅停机
# ========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.cloud.gateway.httpclient.pool.acquire-timeout=5000

# ========================
# Sentry 错误追踪
# ========================
sentry.dsn=${SENTRY_DSN:https://examplePublicKey@o0.ingest.sentry.io/0}
sentry.environment=${SENTRY_ENV:development}
sentry.traces-sample-rate=0.2

# ========================
# OpenTelemetry 分布式追踪
# ========================
otel.service.name=${spring.application.name}
otel.exporter.otlp.endpoint=http://192.168.1.25:4318
otel.exporter.otlp.protocol=http/protobuf
otel.traces.sampler=parentbased_traceidratio
otel.traces.sampler.arg=1.0