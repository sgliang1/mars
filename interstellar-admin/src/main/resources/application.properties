server.port=8085
spring.application.name=interstellar-admin

spring.config.import=nacos:interstellar.properties?group=DEFAULT_GROUP&refreshEnabled=true

spring.cloud.nacos.server-addr=${NACOS_ADDR:192.168.1.25:8848}
spring.cloud.nacos.username=${NACOS_USERNAME:nacos}
spring.cloud.nacos.password=${NACOS_PASSWORD:030523}

# 禁用 Nacos 客户端自带的 logback 配置，避免 appender 名称冲突
nacos.logging.default.config.enabled=false

# Redis 配置（覆盖 Nacos 默认的 localhost）
spring.data.redis.host=${REDIS_HOST:192.168.1.25}
spring.data.redis.port=${REDIS_PORT:6379}

# FCM 推送配置（确保审核通知能推送到用户设备）
interstellar.push.enabled=true

# ========================
# 优雅停机
# ========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========================
# Sentry 错误追踪
# ========================
sentry.dsn=${SENTRY_DSN:https://examplePublicKey@o0.ingest.sentry.io/0}
sentry.environment=${SENTRY_ENV:development}
sentry.traces-sample-rate=0.2