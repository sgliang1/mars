# ==========================================
# ??????
# ==========================================
spring.application.name=mars-post
server.port=8082

# ==========================================
# Nacos ???? & ???? (?????)
# ==========================================
# ???Spring Boot 3.x ???? import ????????
spring.config.import=nacos:mars-post.properties?group=DEFAULT_GROUP&refreshEnabled=true

# Nacos ?????
spring.cloud.nacos.server-addr=192.168.1.25:8848
spring.cloud.nacos.username=nacos
spring.cloud.nacos.password=030523

# 禁用 Nacos 客户端自带的 logback 配置，避免 appender 名称冲突
nacos.logging.default.config.enabled=false

# Redis 配置（覆盖 Nacos 默认的 localhost）
spring.data.redis.host=192.168.1.25
spring.data.redis.port=6379

# ==========================================
# ???????
# ==========================================
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
file.local-path=E:/mars_uploads/

# ========================
# RocketMQ 配置
# ========================
rocketmq.name-server=192.168.1.25:9876
rocketmq.producer.group=mars-post-producer
rocketmq.producer.send-message-timeout=3000

# ========================
# Actuator + Prometheus 指标
# ========================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=${spring.application.name}

# ========================
# Elasticsearch（可选）
# ========================
# 排除 ES 仓库自动配置，由 ElasticsearchConfig 条件化控制
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
# 设为 true 需确保 ES 可用；设为 false 则搜索功能降级，应用正常启动
search.elasticsearch.enabled=false

# ========================
# 优雅停机
# ========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========================
# Sentry 错误追踪
# ========================
sentry.dsn=${SENTRY_DSN:https://examplePublicKey@o0.ingest.sentry.io/0}
sentry.environment=${SENTRY_ENV:development}
sentry.traces-sample-rate=0.2