server.port=8084
spring.application.name=mars-user

spring.config.import=nacos:mars-post.properties?group=DEFAULT_GROUP&refreshEnabled=true

spring.cloud.nacos.server-addr=192.168.1.25:8848
spring.cloud.nacos.username=nacos
spring.cloud.nacos.password=030523

# 禁用 Nacos 客户端自带的 logback 配置，避免 appender 名称冲突
nacos.logging.default.config.enabled=false

# Redis 配置（覆盖 Nacos 默认的 localhost）
spring.data.redis.host=192.168.1.25
spring.data.redis.port=6379

# ========================
# Actuator + Prometheus 指标
# ========================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=${spring.application.name}

# ========================
# 优雅停机
# ========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========================
# Sentry 错误追踪
# ========================
sentry.dsn=${SENTRY_DSN:https://examplePublicKey@o0.ingest.sentry.io/0}
sentry.environment=${SENTRY_ENV:development}
sentry.traces-sample-rate=0.2

# ========================
# OpenTelemetry 分布式追踪
# ========================
otel.service.name=${spring.application.name}
otel.exporter.otlp.endpoint=http://192.168.1.25:4318
otel.exporter.otlp.protocol=http/protobuf
otel.traces.sampler=parentbased_traceidratio
otel.traces.sampler.arg=1.0